server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API backend
    location /api/ {
        proxy_pass http://site_cameras_back:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / "/; SameSite=Strict";
    }

    # Images historique caméras
    location /camera-history/ {
        proxy_pass http://site_cameras_back:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Flux caméras via YARP (toutes les routes mediamtx)
    location ~* ^/(asnieres|villy|villy2|villy3)(|_low)/ {
        proxy_pass http://site_cameras_back:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAPI / Scalar docs
    location /openapi/ {
        proxy_pass http://site_cameras_back:8080;
    }
    location /scalar/ {
        proxy_pass http://site_cameras_back:8080;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
